<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SpendWise — Budget Planner</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --grad1: #f97316;
      --grad2: #ec4899;
      --grad3: #8b5cf6;
      --grad4: #06b6d4;
      --income-clr: #10b981;
      --expense-clr: #f43f5e;
      --savings-clr: #f59e0b;
      --bg: #fdf4ff;
      --surface: #ffffff;
      --border: #e9d5ff;
      --text: #1e1b4b;
      --muted: #7c6f9f;
      --card-shadow: 0 4px 24px rgba(139,92,246,0.10);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse 70% 40% at 0% 0%, rgba(249,115,22,0.13) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 100% 0%, rgba(139,92,246,0.13) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 50% 100%, rgba(6,182,212,0.10) 0%, transparent 60%);
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #f97316, #ec4899, #8b5cf6);
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 4px 24px rgba(236,72,153,0.25);
      position: relative;
      overflow: hidden;
    }
    header::after {
      content:'';
      position: absolute;
      right: -60px; top: -60px;
      width: 200px; height: 200px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
    }
    header::before {
      content:'';
      position: absolute;
      left: 30%; bottom: -40px;
      width: 120px; height: 120px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
    }
    .logo {
      font-size: 1.7rem;
      font-weight: 900;
      color: white;
      letter-spacing: -1px;
    }
    .logo span { opacity: 0.75; font-weight: 600; font-size: 1rem; display:block; margin-top:-4px; }
    .month-badge {
      font-family: 'JetBrains Mono', monospace;
      background: rgba(255,255,255,0.2);
      color: white;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 999px;
      padding: 0.4rem 1rem;
      font-size: 0.8rem;
      backdrop-filter: blur(4px);
    }

    /* ── Layout ── */
    .main {
      max-width: 1000px;
      margin: 0 auto;
      padding: 1.8rem 1.5rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.2rem;
    }
    @media (max-width: 680px) { .main { grid-template-columns: 1fr; padding: 1rem; } }
    .full { grid-column: 1/-1; }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border-radius: 20px;
      padding: 1.4rem;
      box-shadow: var(--card-shadow);
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }
    .card-label {
      font-size: 0.65rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    /* ── Summary Stats ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: 1rem;
    }
    .stat-pill {
      border-radius: 16px;
      padding: 1.1rem 0.8rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .stat-pill.income  { background: linear-gradient(135deg,#d1fae5,#a7f3d0); }
    .stat-pill.expense { background: linear-gradient(135deg,#ffe4e6,#fecdd3); }
    .stat-pill.balance { background: linear-gradient(135deg,#ede9fe,#ddd6fe); }
    .stat-icon { font-size: 1.5rem; margin-bottom: 0.3rem; }
    .stat-amount {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.25rem;
      font-weight: 700;
      display: block;
    }
    .stat-pill.income  .stat-amount { color: #065f46; }
    .stat-pill.expense .stat-amount { color: #9f1239; }
    .stat-pill.balance .stat-amount { color: #4c1d95; }
    .stat-lbl { font-size: 0.7rem; color: var(--muted); font-weight: 700; margin-top: 2px; text-transform: uppercase; letter-spacing: 1px; }

    /* ── Form ── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.7rem;
    }
    .form-grid .span2 { grid-column: 1/-1; }
    label { font-size: 0.75rem; font-weight: 700; color: var(--muted); display: block; margin-bottom: 0.3rem; text-transform: uppercase; letter-spacing: 1px; }
    input, select {
      width: 100%;
      padding: 0.65rem 0.9rem;
      border: 2px solid var(--border);
      border-radius: 12px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.9rem;
      color: var(--text);
      background: #faf5ff;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus, select:focus {
      border-color: #8b5cf6;
      box-shadow: 0 0 0 3px rgba(139,92,246,0.12);
    }

    .type-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
      margin-bottom: 0.2rem;
    }
    .type-btn {
      padding: 0.6rem;
      border-radius: 12px;
      border: 2px solid var(--border);
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      background: #faf5ff;
      color: var(--muted);
    }
    .type-btn.active-income  { background: linear-gradient(135deg,#10b981,#059669); color:white; border-color: #10b981; }
    .type-btn.active-expense { background: linear-gradient(135deg,#f43f5e,#e11d48); color:white; border-color: #f43f5e; }

    .add-btn {
      width: 100%;
      padding: 0.75rem;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #f97316, #ec4899, #8b5cf6);
      color: white;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 1rem;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      letter-spacing: 0.5px;
    }
    .add-btn:hover { opacity: 0.88; }
    .add-btn:active { transform: scale(0.97); }

    /* ── Transaction List ── */
    #tx-list { display: flex; flex-direction: column; gap: 0.6rem; max-height: 320px; overflow-y: auto; padding-right: 4px; }
    #tx-list::-webkit-scrollbar { width: 4px; }
    #tx-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }

    .tx-item {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.8rem 1rem;
      border-radius: 14px;
      border: 1.5px solid var(--border);
      background: #faf5ff;
      animation: popIn 0.25s ease;
      transition: transform 0.15s;
    }
    .tx-item:hover { transform: translateX(4px); }
    @keyframes popIn {
      from { opacity:0; transform: scale(0.95); }
      to   { opacity:1; transform: scale(1); }
    }
    .tx-cat-icon {
      width: 38px; height: 38px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
    }
    .tx-item.income  .tx-cat-icon { background: #d1fae5; }
    .tx-item.expense .tx-cat-icon { background: #ffe4e6; }
    .tx-info { flex: 1; min-width: 0; }
    .tx-name { font-weight: 700; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tx-meta { font-size: 0.7rem; color: var(--muted); margin-top: 1px; }
    .tx-amount {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 0.95rem;
      flex-shrink: 0;
    }
    .tx-item.income  .tx-amount { color: var(--income-clr); }
    .tx-item.expense .tx-amount { color: var(--expense-clr); }
    .tx-del {
      background: none; border: none;
      color: #d1d5db; cursor: pointer;
      font-size: 1rem; padding: 4px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }
    .tx-del:hover { color: var(--expense-clr); background: #ffe4e6; }

    .filter-row {
      display: flex; gap: 0.5rem; margin-bottom: 0.8rem; flex-wrap: wrap;
    }
    .filter-btn {
      padding: 0.3rem 0.8rem;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: #faf5ff;
      font-family: 'Nunito', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn.active {
      background: linear-gradient(135deg,#8b5cf6,#ec4899);
      color: white; border-color: transparent;
    }

    .empty-tx {
      text-align: center; padding: 2rem;
      color: var(--muted); font-size: 0.85rem;
    }
    .empty-tx div:first-child { font-size: 2.2rem; margin-bottom: 0.5rem; }

    /* ── Charts ── */
    .chart-wrap { position: relative; height: 200px; }

    /* ── Savings Goal ── */
    .goal-section { display: flex; flex-direction: column; gap: 0.8rem; }
    .goal-item {
      background: #faf5ff;
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 0.9rem 1rem;
    }
    .goal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
    .goal-name { font-weight: 800; font-size: 0.9rem; }
    .goal-pct {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      font-weight: 700;
      color: #8b5cf6;
    }
    .goal-bar-wrap { background: #ede9fe; border-radius: 999px; height: 8px; overflow: hidden; }
    .goal-bar {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #f97316, #ec4899, #8b5cf6);
      transition: width 0.6s cubic-bezier(.34,1.56,.64,1);
    }
    .goal-meta { display: flex; justify-content: space-between; margin-top: 0.4rem; font-size: 0.72rem; color: var(--muted); font-weight: 600; }
    .goal-del { background: none; border: none; color: #d1d5db; cursor: pointer; font-size: 0.9rem; transition: color 0.15s; }
    .goal-del:hover { color: var(--expense-clr); }

    .goal-form { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .goal-form input { flex: 1; min-width: 100px; }
    .goal-add-btn {
      padding: 0.65rem 1rem;
      border: none; border-radius: 12px;
      background: linear-gradient(135deg,#f59e0b,#f97316);
      color: white; font-family: 'Nunito', sans-serif;
      font-weight: 800; font-size: 0.85rem;
      cursor: pointer; transition: opacity 0.2s;
      white-space: nowrap;
    }
    .goal-add-btn:hover { opacity: 0.85; }
  </style>
</head>
<body>

<header>
  <div class="logo">SpendWise <span>Budget Planner</span></div>
  <div class="month-badge" id="month-label"></div>
</header>

<div class="main">

  <!-- Summary -->
  <div class="card full">
    <div class="card-label">Financial Overview</div>
    <div class="stats-row">
      <div class="stat-pill income">
        <div class="stat-icon">💰</div>
        <span class="stat-amount" id="total-income">₹0</span>
        <div class="stat-lbl">Total Income</div>
      </div>
      <div class="stat-pill expense">
        <div class="stat-icon">💸</div>
        <span class="stat-amount" id="total-expense">₹0</span>
        <div class="stat-lbl">Total Expenses</div>
      </div>
      <div class="stat-pill balance">
        <div class="stat-icon">📊</div>
        <span class="stat-amount" id="balance">₹0</span>
        <div class="stat-lbl">Balance</div>
      </div>
    </div>
  </div>

  <!-- Add Transaction -->
  <div class="card">
    <div class="card-label">Add Transaction</div>
    <div class="type-toggle">
      <button class="type-btn active-income" id="btn-income" onclick="setType('income')">＋ Income</button>
      <button class="type-btn" id="btn-expense" onclick="setType('expense')">－ Expense</button>
    </div>
    <div class="form-grid" style="margin-top:0.8rem">
      <div class="span2">
        <label>Description</label>
        <input type="text" id="tx-name" placeholder="e.g. Freelance payment..." maxlength="40"/>
      </div>
      <div>
        <label>Amount (₹)</label>
        <input type="number" id="tx-amount" placeholder="0.00" min="0"/>
      </div>
      <div>
        <label>Category</label>
        <select id="tx-cat">
          <option value="🍔 Food">🍔 Food</option>
          <option value="🚗 Transport">🚗 Transport</option>
          <option value="🏠 Housing">🏠 Housing</option>
          <option value="🎉 Entertainment">🎉 Entertainment</option>
          <option value="💊 Health">💊 Health</option>
          <option value="📚 Education">📚 Education</option>
          <option value="🛍️ Shopping">🛍️ Shopping</option>
          <option value="💼 Salary">💼 Salary</option>
          <option value="📈 Investment">📈 Investment</option>
          <option value="🎁 Gift">🎁 Gift</option>
          <option value="⚡ Utilities">⚡ Utilities</option>
          <option value="🌐 Other">🌐 Other</option>
        </select>
      </div>
      <div>
        <label>Month</label>
        <input type="month" id="tx-month"/>
      </div>
      <div class="span2">
        <button class="add-btn" onclick="addTransaction()">＋ Add Transaction</button>
      </div>
    </div>
  </div>

  <!-- Transaction List -->
  <div class="card">
    <div class="card-label">Transactions</div>
    <div class="filter-row">
      <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" onclick="setFilter('income',this)">Income</button>
      <button class="filter-btn" onclick="setFilter('expense',this)">Expense</button>
    </div>
    <div id="tx-list"></div>
  </div>

  <!-- Pie Chart -->
  <div class="card">
    <div class="card-label">Spending by Category</div>
    <div class="chart-wrap"><canvas id="pie-chart"></canvas></div>
  </div>

  <!-- Bar Chart -->
  <div class="card">
    <div class="card-label">Monthly Income vs Expense</div>
    <div class="chart-wrap"><canvas id="bar-chart"></canvas></div>
  </div>

  <!-- Savings Goals -->
  <div class="card full">
    <div class="card-label">Savings Goals</div>
    <div class="goal-form" style="margin-bottom:1rem">
      <input type="text" id="goal-name" placeholder="Goal name (e.g. Laptop)" style="flex:2"/>
      <input type="number" id="goal-target" placeholder="Target ₹" min="1"/>
      <input type="number" id="goal-saved" placeholder="Saved ₹" min="0"/>
      <button class="goal-add-btn" onclick="addGoal()">＋ Add Goal</button>
    </div>
    <div class="goal-section" id="goals-list">
      <div class="empty-tx"><div>🎯</div>No savings goals yet. Add one above!</div>
    </div>
  </div>

</div>

<script>
  // ── State ──────────────────────────────────────────────
  let transactions = JSON.parse(localStorage.getItem('sw_tx') || '[]');
  let goals        = JSON.parse(localStorage.getItem('sw_goals') || '[]');
  let txType       = 'income';
  let txFilter     = 'all';
  let pieChart, barChart;

  // ── Init month inputs ──────────────────────────────────
  const nowMonth = new Date().toISOString().slice(0,7);
  document.getElementById('tx-month').value = nowMonth;
  document.getElementById('month-label').textContent =
    new Date().toLocaleDateString('en-IN', { month:'long', year:'numeric' });

  // ── Type toggle ────────────────────────────────────────
  function setType(t) {
    txType = t;
    document.getElementById('btn-income').className  = 'type-btn' + (t==='income'  ? ' active-income'  : '');
    document.getElementById('btn-expense').className = 'type-btn' + (t==='expense' ? ' active-expense' : '');
  }

  // ── Add Transaction ────────────────────────────────────
  function addTransaction() {
    const name   = document.getElementById('tx-name').value.trim();
    const amount = parseFloat(document.getElementById('tx-amount').value);
    const cat    = document.getElementById('tx-cat').value;
    const month  = document.getElementById('tx-month').value;
    if (!name || !amount || amount <= 0 || !month) { alert('Please fill all fields!'); return; }

    transactions.push({ id: Date.now(), name, amount, cat, month, type: txType });
    save();
    document.getElementById('tx-name').value   = '';
    document.getElementById('tx-amount').value = '';
    render();
  }

  // ── Delete Transaction ─────────────────────────────────
  function deleteTx(id) {
    transactions = transactions.filter(t => t.id !== id);
    save();
    render();
  }

  // ── Filter ─────────────────────────────────────────────
  function setFilter(f, el) {
    txFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    renderList();
  }

  // ── Add Goal ───────────────────────────────────────────
  function addGoal() {
    const name   = document.getElementById('goal-name').value.trim();
    const target = parseFloat(document.getElementById('goal-target').value);
    const saved  = parseFloat(document.getElementById('goal-saved').value) || 0;
    if (!name || !target || target <= 0) { alert('Please enter goal name and target!'); return; }
    goals.push({ id: Date.now(), name, target, saved });
    save();
    document.getElementById('goal-name').value   = '';
    document.getElementById('goal-target').value = '';
    document.getElementById('goal-saved').value  = '';
    renderGoals();
  }

  function deleteGoal(id) {
    goals = goals.filter(g => g.id !== id);
    save();
    renderGoals();
  }

  // ── Save ───────────────────────────────────────────────
  function save() {
    localStorage.setItem('sw_tx', JSON.stringify(transactions));
    localStorage.setItem('sw_goals', JSON.stringify(goals));
  }

  // ── Helpers ────────────────────────────────────────────
  const fmt = n => '₹' + n.toLocaleString('en-IN', { minimumFractionDigits:2, maximumFractionDigits:2 });

  // ── Render ─────────────────────────────────────────────
  function render() {
    const income  = transactions.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
    const expense = transactions.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
    document.getElementById('total-income').textContent  = fmt(income);
    document.getElementById('total-expense').textContent = fmt(expense);
    const bal = income - expense;
    const balEl = document.getElementById('balance');
    balEl.textContent = fmt(Math.abs(bal));
    balEl.style.color = bal >= 0 ? '#065f46' : '#9f1239';

    renderList();
    renderPie();
    renderBar();
  }

  function renderList() {
    const list = document.getElementById('tx-list');
    const filtered = txFilter === 'all' ? transactions : transactions.filter(t => t.type === txFilter);
    if (!filtered.length) {
      list.innerHTML = `<div class="empty-tx"><div>📭</div>No transactions yet!</div>`;
      return;
    }
    list.innerHTML = [...filtered].reverse().map(t => `
      <div class="tx-item ${t.type}">
        <div class="tx-cat-icon">${t.cat.split(' ')[0]}</div>
        <div class="tx-info">
          <div class="tx-name">${t.name}</div>
          <div class="tx-meta">${t.cat.split(' ').slice(1).join(' ')} &bull; ${t.month}</div>
        </div>
        <div class="tx-amount">${t.type==='income'?'+':'-'}${fmt(t.amount)}</div>
        <button class="tx-del" onclick="deleteTx(${t.id})">✕</button>
      </div>
    `).join('');
  }

  function renderPie() {
    const expenses = transactions.filter(t => t.type === 'expense');
    const catMap = {};
    expenses.forEach(t => { catMap[t.cat] = (catMap[t.cat]||0) + t.amount; });
    const labels = Object.keys(catMap);
    const data   = Object.values(catMap);

    const palette = ['#f97316','#ec4899','#8b5cf6','#06b6d4','#10b981','#f59e0b','#ef4444','#3b82f6','#a855f7','#14b8a6','#f43f5e','#84cc16'];

    const ctx = document.getElementById('pie-chart').getContext('2d');
    if (pieChart) pieChart.destroy();

    if (!labels.length) {
      ctx.clearRect(0,0,400,400);
      ctx.fillStyle = '#c4b5fd';
      ctx.font = '14px Nunito';
      ctx.textAlign = 'center';
      ctx.fillText('No expense data yet', 200, 100);
      return;
    }

    pieChart = new Chart(ctx, {
      type: 'doughnut',
      data: { labels, datasets: [{ data, backgroundColor: palette, borderWidth: 0, hoverOffset: 8 }] },
      options: {
        responsive: true, maintainAspectRatio: false,
        cutout: '60%',
        plugins: {
          legend: { position: 'right', labels: { font: { family:'Nunito', size:10 }, boxWidth:12, padding:8, color:'#7c6f9f' }},
          tooltip: { callbacks: { label: c => ` ${fmt(c.parsed)}` }}
        }
      }
    });
  }

  function renderBar() {
    // Collect all unique months
    const monthSet = new Set(transactions.map(t => t.month));
    const months   = [...monthSet].sort();
    if (!months.length) months.push(nowMonth);

    const incomeData  = months.map(m => transactions.filter(t=>t.type==='income'&&t.month===m).reduce((s,t)=>s+t.amount,0));
    const expenseData = months.map(m => transactions.filter(t=>t.type==='expense'&&t.month===m).reduce((s,t)=>s+t.amount,0));
    const labels = months.map(m => { const [y,mo] = m.split('-'); return new Date(y,mo-1).toLocaleDateString('en-IN',{month:'short',year:'2-digit'}); });

    const ctx = document.getElementById('bar-chart').getContext('2d');
    if (barChart) barChart.destroy();

    barChart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels,
        datasets: [
          { label:'Income',  data: incomeData,  backgroundColor:'rgba(16,185,129,0.75)', borderRadius:8, borderSkipped:false },
          { label:'Expense', data: expenseData, backgroundColor:'rgba(244,63,94,0.75)',  borderRadius:8, borderSkipped:false },
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { labels: { font:{ family:'Nunito', size:10 }, boxWidth:12, color:'#7c6f9f' }},
          tooltip: { callbacks: { label: c => ` ${fmt(c.parsed.y)}` }}
        },
        scales: {
          x: { grid:{ color:'rgba(0,0,0,0.04)' }, ticks:{ color:'#7c6f9f', font:{ family:'JetBrains Mono', size:9 }}},
          y: { grid:{ color:'rgba(0,0,0,0.04)' }, ticks:{ color:'#7c6f9f', font:{ family:'JetBrains Mono', size:9 }, callback: v => '₹'+v.toLocaleString('en-IN') }}
        }
      }
    });
  }

  function renderGoals() {
    const el = document.getElementById('goals-list');
    if (!goals.length) {
      el.innerHTML = `<div class="empty-tx"><div>🎯</div>No savings goals yet. Add one above!</div>`;
      return;
    }
    el.innerHTML = goals.map(g => {
      const pct = Math.min(100, Math.round((g.saved/g.target)*100));
      return `
        <div class="goal-item">
          <div class="goal-header">
            <div class="goal-name">🎯 ${g.name}</div>
            <div style="display:flex;align-items:center;gap:0.5rem">
              <div class="goal-pct">${pct}%</div>
              <button class="goal-del" onclick="deleteGoal(${g.id})">✕</button>
            </div>
          </div>
          <div class="goal-bar-wrap"><div class="goal-bar" style="width:${pct}%"></div></div>
          <div class="goal-meta">
            <span>Saved: ${fmt(g.saved)}</span>
            <span>Target: ${fmt(g.target)}</span>
          </div>
        </div>
      `;
    }).join('');
  }

  // ── Init ───────────────────────────────────────────────
  render();
  renderGoals();
</script>
</body>
</html>
